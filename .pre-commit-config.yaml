# Pre-commit hooks for this repo.
#
# One-time setup after cloning:
#     brew install pre-commit
#     pre-commit install
#
# Then `git commit` automatically runs the hooks below against staged changes.
# To run against the whole repo on demand:
#     pre-commit run --all-files
# To bypass in an emergency:
#     git commit --no-verify

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
